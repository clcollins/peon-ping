name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make tidy-check
      - run: make fmt
      - run: make vet
      - run: make cover
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3
      - run: make build

  docs-check:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make docs-check
      - run: npx --yes markdownlint-cli2 "docs/**/*.md" "*.md"
